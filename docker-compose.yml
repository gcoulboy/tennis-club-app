version: "3.8"

services:
  tennis-club:
    build: .
    container_name: tennis-club-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      # ⚠️ CHANGEZ CE SECRET avant de déployer !
      - JWT_SECRET=CHANGEZ_CE_SECRET_TRES_LONG_ET_ALEATOIRE
      - DB_PATH=/app/data/tennis.db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
